name: Daily Community Digest
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: daily-digest
  cancel-in-progress: false
jobs:
  run:
    runs-on: [self-hosted, windows, dc-crawler]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Python
        shell: powershell
        run: |
          python --version
          python -m pip --version

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip --trusted-host pypi.org --trusted-host files.pythonhosted.org --trusted-host pypi.python.org
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt --trusted-host pypi.org --trusted-host files.pythonhosted.org --trusted-host pypi.python.org
          } else {
            pip install requests beautifulsoup4 lxml --trusted-host pypi.org --trusted-host files.pythonhosted.org --trusted-host pypi.python.org
          }

      - name: Run digest
        shell: powershell
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          HOURS: '24'
          DC_ENABLED: '1'
          ARCA_ENABLED: '1'
          REQUEST_INTERVAL_SEC: '1.5'
          MAX_PAGES_DC: '10'
          MAX_LINKS_ARCA: '120'
          PYTHONUNBUFFERED: '1'
        run: python app.py
